<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Policy｜いびつなシューティング</title>
  <style>
:root {
  --bg: #f6f7fb;
  --panel: rgba(255,255,255,0.96);
  --text: #172033;
  --muted: #667085;
  --line: #d0d5dd;
  --accent: #2563eb;
  --shadow: 0 18px 50px rgba(16,24,40,0.18);
}
* { box-sizing: border-box; }
html, body { margin: 0; min-height: 100%; }
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at 50% 12%, rgba(37,99,235,0.13), transparent 35%),
    linear-gradient(180deg, #ffffff 0%, #eef2ff 100%);
  padding: 22px;
}
.language-switch {
  position: fixed;
  top: 14px;
  right: 14px;
  z-index: 20;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 40px;
  padding: 8px 14px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,0.94);
  color: var(--text);
  font-weight: 800;
  cursor: pointer;
  box-shadow: 0 8px 22px rgba(16,24,40,0.12);
}
.wrapper {
  min-height: calc(100vh - 44px);
  display: flex;
  align-items: center;
  justify-content: center;
}
.panel {
  width: min(880px, 100%);
  background: var(--panel);
  border: 1px solid rgba(255,255,255,0.9);
  border-radius: 28px;
  box-shadow: var(--shadow);
  padding: clamp(22px, 4vw, 44px);
}
h1 {
  margin: 0 0 14px;
  font-size: clamp(32px, 6vw, 60px);
  line-height: 1.15;
  letter-spacing: 0.03em;
}
h2 {
  margin: 28px 0 10px;
  font-size: clamp(22px, 3.2vw, 34px);
}
p, li {
  font-size: clamp(16px, 2vw, 19px);
  line-height: 1.8;
}
.btn-row {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 26px;
}
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 48px;
  padding: 12px 22px;
  border-radius: 999px;
  text-decoration: none;
  border: none;
  cursor: pointer;
  font-size: 16px;
  font-weight: 800;
  color: #fff;
  background: var(--accent);
  box-shadow: 0 9px 22px rgba(37,99,235,0.25);
}
.btn.secondary {
  color: var(--text);
  background: #fff;
  border: 1px solid var(--line);
  box-shadow: none;
}
.notice {
  color: var(--muted);
  font-size: 14px;
  margin-top: 18px;
}
.policy-box {
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 2px 20px 18px;
  background: rgba(255,255,255,0.70);
}
@media (max-width: 560px) {
  body { padding: 12px; padding-top: 62px; }
  .wrapper { min-height: calc(100vh - 74px); }
  .btn { width: 100%; }
}
  </style>
</head>
<body>
  <button id="langToggle" class="language-switch" type="button" aria-label="Change language">English</button>
  <main class="wrapper">
    <div class="panel">
      <section id="policyBox" class="policy-box"></section>
      <div class="btn-row">
        <a class="btn secondary" href="index.html" data-i18n="home">ホームに戻る</a>
        <button class="btn" type="button" id="startGameBtn" data-i18n="startGame">ゲームを始める</button>
      </div>
      <p class="notice" data-i18n="notice">Policy画面からゲームを始めた場合も、ゲーム画面でブラウザの戻るボタンを押すとメイン画面に戻ります。</p>
    </div>
  </main>

  <script>
  (() => {
    const I18N = {
      ja: {
        pageTitle: 'Policy｜いびつなシューティング',
        toggle: 'English',
        home: 'ホームに戻る',
        startGame: 'ゲームを始める',
        notice: 'Policy画面からゲームを始めた場合も、ゲーム画面でブラウザの戻るボタンを押すとメイン画面に戻ります。',
        policyHtml: `
          <h1>「いびつなシューティング」利用条件</h1>
          <p>本ソフトウェアは、研究、教育、および試作目的で公開されています。<br>医療機器として設計・認証されたものではありません。</p>

          <h2>利用について</h2>
          <p>個人法人問わず全ての方の利用を許可します。</p>

          <h2>禁止事項</h2>
          <ul>
            <li>本ソフトウェア自体の販売</li>
            <li>作者またはサークルを偽る行為</li>
            <li>法令または公序良俗に反する利用</li>
          </ul>

          <h2>免責事項</h2>
          <p>本ソフトウェアを用いたリハビリテーション、運動指導、訓練、評価、臨床判断、安全管理等は、利用者および導入施設の責任において実施してください。</p>
          <p>作者および関係者は、本ソフトウェアの利用または利用不能により生じた、転倒、負傷、体調不良、機器故障、データ消失、業務上の損害、第三者との権利問題、その他一切の損害について責任を負いません。</p>
          <p>本ソフトウェアは現状有姿（AS IS）で提供され、動作保証、継続的提供保証、特定目的適合性保証、医療的有効性保証を行いません。</p>
        `
      },
      en: {
        pageTitle: 'Policy | Distorted Shooting',
        toggle: '日本語',
        home: 'Back to Home',
        startGame: 'Start Game',
        notice: 'Even when you start the game from the Policy page, pressing the browser Back button on the game screen will return you to the main page.',
        policyHtml: `
          <h1>Terms of Use for “Distorted Shooting”</h1>
          <p>This software is published for research, education, and prototype purposes.<br>It is not designed, certified, or approved as a medical device.</p>

          <h2>Use</h2>
          <p>Use of this software is permitted for all users, including individuals and organizations.</p>

          <h2>Prohibited Actions</h2>
          <ul>
            <li>Selling this software itself</li>
            <li>Falsely claiming to be the author or affiliated circle</li>
            <li>Using this software in violation of laws, regulations, or public order and morals</li>
          </ul>

          <h2>Disclaimer</h2>
          <p>Any rehabilitation, exercise instruction, training, assessment, clinical judgment, safety management, or related activity using this software must be conducted under the responsibility of the user and the facility introducing it.</p>
          <p>The author and related parties assume no responsibility for falls, injuries, health problems, device failures, data loss, business losses, rights issues with third parties, or any other damages arising from the use or inability to use this software.</p>
          <p>This software is provided “AS IS,” without warranties of operation, continuous availability, fitness for a particular purpose, or medical effectiveness.</p>
        `
      }
    };

    function getLang() {
      const saved = localStorage.getItem('ibitsu_shooting_lang');
      return saved === 'en' ? 'en' : 'ja';
    }
    function setLang(lang) {
      localStorage.setItem('ibitsu_shooting_lang', lang);
      document.documentElement.lang = lang;
      document.title = I18N[lang].pageTitle;
      document.getElementById('policyBox').innerHTML = I18N[lang].policyHtml;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        el.textContent = I18N[lang][key] || I18N.ja[key] || key;
      });
      document.getElementById('langToggle').textContent = I18N[lang].toggle;
      document.getElementById('langToggle').setAttribute('aria-label', lang === 'ja' ? 'Switch to English' : '日本語に切り替える');
    }

    document.getElementById('langToggle').addEventListener('click', () => {
      setLang(getLang() === 'ja' ? 'en' : 'ja');
    });
    document.getElementById('startGameBtn').addEventListener('click', () => {
      window.location.replace('game.html');
    });
    setLang(getLang());
  })();
  </script>
</body>
</html>
